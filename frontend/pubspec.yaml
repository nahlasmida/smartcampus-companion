name: smart_campus_companion
description: A mobile app for university campus navigation
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Networking
  dio: ^5.4.0
  timezone: ^0.9.2
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.4

  # Local Storage
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # Auth & Security
  local_auth: ^2.2.0

  # URL Launcher (for PDF export - works on Web + Mobile)
  url_launcher: ^6.2.5

  # FREE MAP (No API Key Required!)
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # Sensors & Hardware
  geolocator: ^11.0.0
  image_picker: ^1.0.7
  sensors_plus: ^4.0.2
  permission_handler: ^11.3.1

  # Notifications
  flutter_local_notifications: ^16.3.0

  # UI
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  # Uncomment when you add assets
  # assets:
  #   - assets/images/
  #   - assets/icons/

  # Uncomment when you add fonts
  # fonts:
  #   - family: Poppins
  #     fonts:
  #       - asset: assets/fonts/Poppins-Regular.ttf
  #       - asset: assets/fonts/Poppins-Bold.ttf
  #         weight: 700